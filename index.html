<!DOCTYPE html>
<html>
<head>
    <title>Health of U.S. Forests</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

    <style>
        body { margin: 0; }
        #map { height: 80vh; }
        #sidebar {
            padding: 10px;
            background: #f4f4f4;
        }
    </style>
</head>
<body>

<h1>Health of U.S. Forests</h1>
<h3>Exploring patterns of forest disturbance and restoration needs</h3>

<div id="map"></div>

<div id="sidebar">
    <!-- Placeholder for filters -->
    <label>Select Indicator:</label>
    <select>
        <option>States</option>
        <option>Counties</option>
        <option> </option>
    </select>

    <!-- Placeholder for future chart -->
    <p>Chart placeholder</p>
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
    // Initialize map centered on US
    var map = L.map('map').setView([39.5, -98.5], 4);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

function getColor(d) {
 if (d === null || isNaN(d)) return '#bdbdbd'; 
  if (d === 0) return '#d9d9d9';               
  return d > 80 ? '#00441b' :
         d > 60 ? '#238b45' :
         d > 40 ? '#66c2a4' :
         d > 20 ? '#ccece6' :
                  '#e5f5e0';
}


    // TODO: Add forest data layer
    // Load States
let statesLayer;

fetch('Data/Forest_Percent_State_2020.geojson')
  .then(response => response.json())
  .then(data => {

    statesLayer = L.geoJson(data, {

      style: function(feature) {
        return {
          fillColor: getColor(feature.properties.forest_pct),
          weight: 1.5,
          color: 'white',
          fillOpacity: 0.7
        };
      },

      onEachFeature: function(feature, layer) {
        let value = feature.properties.forest_pct;

        if (value !== null && !isNaN(value)) {
          value = value.toFixed(1) + "%";
        } else {
          value = "No Data";
        }

        layer.bindPopup(
          "<b>" + feature.properties.NAME + "</b><br>" +
          "Forest Cover: " + value
        );
      }

    }).addTo(map); // states visible by default

  });

let countiesLayer;

fetch('data/Forest_Percent_County_2020.geojson')
  .then(response => response.json())
  .then(data => {

    countiesLayer = L.geoJson(data, {

      style: function(feature) {

        let value = Number(feature.properties.Forest_Percent_County_2020);

        if (isNaN(value)) value = 0;

        return {
          fillColor: getColor(value),
          weight: 0.6,
          color: '#666',
          fillOpacity: 0.85
        };
      },

      onEachFeature: function(feature, layer) {

        let value = Number(feature.properties.Forest_Percent_County_2020);
        if (isNaN(value)) value = 0;

        layer.bindPopup(
          "<b>" + feature.properties.NAME + "</b><br>" +
          "Forest Cover: " + value.toFixed(1) + "%"
        );
      }

    });

  });

  let stateOutlineLayer;

fetch('Data/Forest_Percent_State_2020.geojson')
  .then(response => response.json())
  .then(data => {

    stateOutlineLayer = L.geoJson(data, {
      style: {
        fill: false,
        color: 'black',
        weight: 1.2
      }
    });

  });

    // TODO: Add choropleth styling


function style(feature) {
    return {
        fillColor: getColor(feature.properties.forest_pct),
        weight: 1,
        opacity: 1,
        color: 'white',
        fillOpacity: 0.7
    };
}

    // TODO: Add interactive tooltips


    function onEachFeature(feature, layer) {
    layer.bindPopup(
        "<b>" + feature.properties.name + "</b><br>" +
        "Forest Cover: " + feature.properties.forest_cover + "%"
    );
}

document.querySelector("select").addEventListener("change", function(e) {

  if (e.target.value === "States") {

    map.removeLayer(countiesLayer);
    map.removeLayer(stateOutlineLayer);
    map.addLayer(statesLayer);

  }

  if (e.target.value === "Counties") {

    map.removeLayer(statesLayer);
    map.addLayer(countiesLayer);
    map.addLayer(stateOutlineLayer); // outline on top

  }

});

</script>

</body>
</html>
